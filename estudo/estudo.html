<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Bíblica - Painel de Estudos</title>
    <link rel="stylesheet" href="../gerador de json/style.css">
    <link rel="stylesheet" href="estudo.css">
</head>

<body>

    <div class="container">
        <h1>Oficina Bíblica - Espaço de Estudos</h1>

        <!-- SELEÇÃO DO BLOCO DE ESTUDO -->
        <div id="estudo-config" class="formulario">
            <h2>Selecione o Conteúdo para Revisão</h2>

            <div class="linha-dupla">
                <div>
                    <label class="obrigatorio">Testamento</label>
                    <select id="estudo-testamento">
                        <option value="">Selecione...</option>
                        <option value="Velho Testamento">Velho Testamento</option>
                        <option value="Novo Testamento">Novo Testamento</option>
                    </select>
                </div>
                <div>
                    <label class="obrigatorio">Categoria</label>
                    <select id="estudo-categoria">
                        <option value="">Selecione...</option>
                        <option value="Livros">Livros</option>
                        <option value="Pessoas">Pessoas</option>
                        <option value="Lugares">Lugares</option>
                        <option value="Eventos">Eventos</option>
                    </select>
                </div>
            </div>

            <div id="areaLivroEstudo" style="display:none;">
                <label class="obrigatorio">Livro</label>
                <select id="estudo-livro">
                    <option value="">Selecione...</option>
                </select>
            </div>

            <button onclick="carregarEstudo()">Abrir Modo Estudo 📖</button>
        </div>

        <!-- MODO FLASHCARD / REVISÃO -->
        <div id="estudo-painel" style="display: none;">
            <div id="estudo-progresso" style="margin-bottom: 15px; font-weight: bold; color: var(--primary);"></div>

            <!-- Card da Pergunta (Frente do Card) -->
            <div class="card-pergunta" style="border-left: 5px solid var(--primary); margin-bottom: 15px;">
                <span id="estudo-nivel"
                    style="float: right; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; padding: 2px 8px; border-radius: 4px;"></span>
                <h3 id="estudo-pergunta-texto">Carregando dados...</h3>
                <br>
                <div id="estudo-alternativas" style="font-size: 0.95rem; line-height: 1.6; color: var(--text-main);">
                    <!-- Alternativas listadas de forma estática -->
                </div>
            </div>

            <!-- Botão para revelar a resposta -->
            <button id="btn-revelar" onclick="revelarResposta()"
                style="width: 100%; margin-bottom: 15px; background-color: var(--accent-gold);">Mostrar Resposta Secreta
                🔍</button>

            <!-- Resposta e Detalhes (Verso do Card - Oculto por padrão) -->
            <div id="estudo-resposta-bloco"
                style="display: none; background: #faf8f5; border: 1.5px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <p style="font-weight: bold; color: #28a745; margin-bottom: 8px;">
                    ✅ Resposta Correta: <span id="estudo-resposta-letra"></span>
                </p>
                <p id="estudo-referencia"
                    style="font-style: italic; font-size: 0.9rem; margin-bottom: 8px; color: var(--primary); font-weight: 500;">
                </p>
                <p id="estudo-explicacao" style="font-size: 0.9rem; line-height: 1.4; color: #555;"></p>
            </div>

            <!-- Navegação entre os Cards -->
            <div class="linha-dupla">
                <button onclick="anteriorCard()" id="btn-anterior">◀️ Anterior</button>
                <button onclick="proximoCard()" id="btn-proximo">Próximo ▶️</button>
            </div>

            <button onclick="voltarConfig()" style="width: 100%; margin-top: 12px; background-color: #6c757d;">Voltar à
                Seleção ↩️</button>
        </div>

    </div>

    <script src="estudo.js"></script>
</body>

</html>
